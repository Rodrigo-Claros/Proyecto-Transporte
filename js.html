// Validar login
function validarLogin() {
  const user = document.getElementById('usuario').value.trim();
  const pass = document.getElementById('password').value.trim();
  const btnIngresar = document.querySelector('button[onclick="validarLogin()"]');

  // Desactivar botón de ingresar
  btnIngresar.disabled = true;

  // Mostrar SweetAlert
  Swal.fire({
    title: 'Verificando credenciales',
    allowOutsideClick: false,
    showConfirmButton: false,
    didOpen: () => {
      Swal.showLoading();
    }
  });

  google.script.run.withSuccessHandler(function (datosUsuario) {
    Swal.close();
    btnIngresar.disabled = false;

    if (!datosUsuario) {
      document.getElementById('usuario').value = "";
      document.getElementById('password').value = "";
      Swal.fire({
        icon: "error",
        title: "Usuario incorrecto",
        text: "Credenciales inválidas o usuario inactivo",
      });
    } else {
      usuarioLogueado = datosUsuario;

      // Mostrar interfaz
      document.getElementById('usuario').value = "";
      document.getElementById('password').value = "";
      document.getElementById('login-page').style.display = 'none';
      document.getElementById('sidebar').style.display = 'block';
      document.getElementById('main-content').style.display = 'block';

      actualizarPanelUsuario(); // actualizar datos en el panel
      aplicarPermisosSegunRol(datosUsuario.TUser);
      iniciarAplicacion();

      // 🔹 Función de permisos por rol
      function aplicarPermisosSegunRol(tipoUsuario) {
        const tipo = (tipoUsuario || "").toLowerCase(); // normaliza a minúsculas

        // Secciones visibles para administrador
        const seccionesAdmin = [
          "contenido-vehiculos",
          "contenido-motoristas",
          "contenido-solicitudes",
          "contenido-solicitudes-nuevas",
          "contenido-solicitudes-procesadas",
          "contenido-consultas"
        ];

        // Secciones visibles para usuario
        const seccionesUsuario = [
          "contenido-inicio",
          "contenido-solicitudes",
          "contenido-solicitudes-procesadas"
        ];

        // Ocultar todas primero
        seccionesAdmin.forEach(id => {
          const link = document.querySelector(`[data-seccion="${id}"]`);
          if (link) link.style.display = "none";
        });
        seccionesUsuario.forEach(id => {
          const link = document.querySelector(`[data-seccion="${id}"]`);
          if (link) link.style.display = "none";
        });

        // Mostrar según rol
        let seccionesVisibles = [];
        if (tipo === "administrador") {
          seccionesVisibles = seccionesAdmin;
        } else if (tipo === "operador") {
          seccionesVisibles = seccionesUsuario;
          document.getElementById("USERINSERT").style.display ="none";
        }

        seccionesVisibles.forEach(id => {
          const link = document.querySelector(`[data-seccion="${id}"]`);
          if (link) link.style.display = "block";
        });
      }

      // 🔹 Mostrar contenido principal por defecto
      document.querySelectorAll('#main-content > div').forEach(div => div.style.display = 'none');
      document.getElementById('contenido-inicio').style.display = 'block';
    }
  }).withFailureHandler(function (err) {
    Swal.close();
    btnIngresar.disabled = false;
    btnIngresar.innerHTML = 'Ingresar';
    alert('Error al conectar con el servidor.');
    console.error(err);
  }).verificarUsuario(user, pass);
}


// Sidebar toggle
function toggleSidebar() {
  const sidebar = document.getElementById('sidebar');
  const content = document.getElementById('main-content');
  sidebar.classList.toggle('collapsed');
  content.classList.toggle('collapsed');
}

// Activar links del menú
document.querySelectorAll('#nav-menu .nav-link').forEach(link => {
  link.addEventListener('click', function (e) {
    e.preventDefault();
    document.querySelectorAll('#nav-menu .nav-link').forEach(l => l.classList.remove('active-link'));
    this.classList.add('active-link');

    const seccion = this.getAttribute('data-seccion');
    document.querySelectorAll('#main-content > div').forEach(div => div.style.display = 'none');
    if (seccion) {
      document.getElementById(seccion).style.display = 'block';
    }

  });
});

    $('#EstablecimientoUser').select2({

      dropdownParent: $('#modalUsuario')

    });
    
  }).obtenerEstablecimientosCompletos();

// Función para autocompletar campos
function autocompletarCamposEstablecimiento(establecimientoNombre, esEdicion) {
  const establecimiento = establecimientosData.find(est => est.Establecimiento === establecimientoNombre);
  
  if (establecimiento) {
    if (esEdicion) {
      $('#DistritoUserEdit').val(establecimiento.Distrito);
      $('#MunicipioUserEdit').val(establecimiento.Municipio);
      $('#SIBASIUserEdit').val(establecimiento.SIBASI);
      $('#DepartamentoUserEdit').val(establecimiento.Departamento);
      $('#RegionalUserEdit').val(establecimiento.Regional);
    } else {
      $('#DistritoUser').val(establecimiento.Distrito);
      $('#MunicipioUser').val(establecimiento.Municipio);
      $('#SIBASIUser').val(establecimiento.SIBASI);
      $('#DepartamentoUser').val(establecimiento.Departamento);
      $('#RegionalUser').val(establecimiento.Regional);
    }
  }
}

// Eventos para usuarios
$(document).ready(function() {
  // Inicializar al cargar la página
  inicializarSelect2EstablecimientosUser();
  
  // Evento para autocompletar campos
  $('#EstablecimientoUser').on('change', function() {
    autocompletarCamposEstablecimiento($(this).val(), false);
  });
  
  $('#EstablecimientoUserEditSelect').on('change', function() {
    autocompletarCamposEstablecimiento($(this).val(), true);
  });
  
  // Limpiar modal al cerrarse 
  $('#modalUsuario').on('hidden.bs.modal', function() {
    // Limpiar campos normales
    $(this).find('input:not([disabled]), select:not(.select2-hidden-accessible)').val('');
    $(this).find('input[disabled]').val('');
    
    // Limpiar y resetear Select2
    $('#EstablecimientoUser').val('').trigger('change');
  });
  
  $('#modalEditarUsuario').on('hidden.bs.modal', function() {
    // Limpiar campos normales
    $(this).find('input:not([disabled]), select:not(.select2-hidden-accessible)').val('');
    $(this).find('input[disabled]').val('');
    
    // Limpiar y resetear Select2
    $('#EstablecimientoUserEditSelect').val('').trigger('change');
  });
});

// GUARDAR NUEVO USUARIO
// ==============================================
function guardarUsuario() {
  const User = document.getElementById('User').value.trim();
  const Password = document.getElementById('Password').value.trim();
  const TUser = document.getElementById('TUser').value.trim();
  const Nombre = document.getElementById('Nombre').value.trim();
  const Cargo = document.getElementById('Cargo').value.trim();
  const Area = document.getElementById('Area').value.trim();
  const Establecimiento = $('#EstablecimientoUser').val();
  const Distrito = document.getElementById('DistritoUser').value.trim();
  const Municipio = document.getElementById('MunicipioUser').value.trim();
  const SIBASI = document.getElementById('SIBASIUser').value.trim();
  const Departamento = document.getElementById('DepartamentoUser').value.trim();
  const Regional = document.getElementById('RegionalUser').value.trim();
  const Estado = document.getElementById('EstadoUser').value.trim();

  if (!User || !Password || !TUser || !Nombre || !Cargo || !Area || !Establecimiento || !Estado) {
    Swal.fire({ icon: "warning", title: "Campos incompletos", text: "Complete todos los campos requeridos." });
    return;
  }

  if (!User.includes('@salud.gob.sv')) {
    Swal.fire({ icon: "error", title: "Email inválido", text: "El correo debe contener @salud.gob.sv" });
    return;
  }

  const btnGuardar = document.querySelector('#modalUsuario .btn-primary');
  btnGuardar.disabled = true;
  btnGuardar.innerHTML = '<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span> Guardando...';

  const nuevoUsuario = {
    User, Password, TUser, Nombre, Cargo, Area, Establecimiento, Distrito, Municipio, SIBASI, Departamento, Regional, Estado
  };

  google.script.run
    .withSuccessHandler(() => {
      const tabla = $('#tablaUsuarios').DataTable();
      const estadoBadge = Estado == 1
        ? '<span class="badge bg-success">Activo</span>'
        : '<span class="badge bg-danger">Inactivo</span>';
      tabla.row.add([
        User, Password, TUser, Nombre, Cargo, Area, Establecimiento, Distrito, Municipio, SIBASI, Departamento, Regional, estadoBadge
      ]).draw(false);

      bootstrap.Modal.getInstance(document.getElementById('modalUsuario')).hide();
      Swal.fire({ icon: "success", title: "¡Guardado!", text: "Usuario registrado correctamente.", timer: 2000 });
      
      btnGuardar.disabled = false;
      btnGuardar.innerHTML = 'Guardar';
    })
    .withFailureHandler(error => {
      Swal.fire({ icon: "error", title: "Error", text: error.message });
      btnGuardar.disabled = false;
      btnGuardar.innerHTML = 'Guardar';
    })
    .guardarUsuarioEnHoja(nuevoUsuario);
}

// ==============================================
// CONFIGURAR CLIC EN FILAS PARA USUARIOS
// ==============================================
function configurarClicFilaUsuarios() {
  const tabla = $('#tablaUsuarios').DataTable();
  $('#tablaUsuarios tbody').on('click', 'tr', function () {
    const datos = tabla.row(this).data();
    if (!datos) return;

    document.getElementById('UsuarioRowIndexEdit').value = tabla.row(this).index();

    document.getElementById('UserEdit').value = datos[0];
    document.getElementById('PasswordEdit').value = datos[1];
    document.getElementById('TUserEdit').value = datos[2];
    document.getElementById('NombreEdit').value = datos[3];
    document.getElementById('CargoEdit').value = datos[4];
    document.getElementById('AreaEdit').value = datos[5];
    $('#EstablecimientoUserEditSelect').val(datos[6]).trigger('change');
    document.getElementById('DistritoUserEdit').value = datos[7];
    document.getElementById('MunicipioUserEdit').value = datos[8];
    document.getElementById('SIBASIUserEdit').value = datos[9];
    document.getElementById('DepartamentoUserEdit').value = datos[10];
    document.getElementById('RegionalUserEdit').value = datos[11];
    const estadoActual = $(datos[12]).text().trim() === 'Activo' ? '1' : '0';
    document.getElementById('EstadoUserEdit').value = estadoActual;

    new bootstrap.Modal(document.getElementById('modalEditarUsuario')).show();
  });
}

// ==============================================
// LISTAR USUARIOS
// ==============================================
function listarUsuarios() {
  if ($.fn.DataTable.isDataTable('#tablaUsuarios')) {
    $('#tablaUsuarios').DataTable().destroy();
    $('#tablaUsuarios').empty();
  }

  google.script.run.withSuccessHandler(function (usuariosJSON) {
    try {
      const usuarios = JSON.parse(usuariosJSON);
      let html = '';

      usuarios.forEach(usuario => {
        const estadoBadge = usuario.Estado == 1
          ? '<span class="badge bg-success">Activo</span>'
          : '<span class="badge bg-danger">Inactivo</span>';

        html += `
        <tr>
          <td>${usuario.User || ''}</td>
          <td>${usuario.Password || ''}</td>
          <td>${usuario.TUser || ''}</td>
          <td>${usuario.Nombre || ''}</td>
          <td>${usuario.Cargo || ''}</td>
          <td>${usuario.Area || ''}</td>
          <td>${usuario.Establecimiento || ''}</td>
          <td>${usuario.Distrito || ''}</td>
          <td>${usuario.Municipio || ''}</td>
          <td>${usuario.SIBASI || ''}</td>
          <td>${usuario.Departamento || ''}</td>
          <td>${usuario.Regional || ''}</td>
          <td>${estadoBadge}</td>
        </tr>`;
      });

      document.getElementById('cuerpoUsuarios').innerHTML = html;

      $('#tablaUsuarios').DataTable({
        language: {
          decimal: ",",
          thousands: ".",
          lengthMenu: "Mostrar _MENU_ registros",
          zeroRecords: "No se encontraron resultados",
          info: "Mostrando _START_ a _END_ de _TOTAL_ registros",
          infoEmpty: "Mostrando 0 a 0 de 0 registros",
          infoFiltered: "(filtrado de _MAX_ registros totales)",
          search: "Buscar:",
          loadingRecords: "Cargando...",
          processing: "Procesando...",
          paginate: {
            first: "Primero",
            last: "Último",
            next: "Siguiente",
            previous: "Anterior"
          }
        },
        columnDefs: [{
          targets: [1, 7, 8, 9, 10, 11],
          visible: false
        }],
        initComplete: function() {
          configurarClicFilaUsuarios();
        }
      });
    } catch (error) {
      console.error('Error al procesar usuarios:', error);
      Swal.fire({
        icon: 'error',
        title: 'Error',
        text: 'No se pudieron cargar los datos de usuarios'
      });
    }
  }).obtenerUsuariosJSON();
}

// FUNCIONES DE MOTORISTAS
// ==============================================
// GUARDAR NUEVO MOTORISTA
// ==============================================
function guardarMotorista() {
  // Obtener todos los valores del formulario
  const Nombre = document.getElementById('Nombremo').value.trim();
  const Fechnat = document.getElementById('Fechnat').value.trim();
  const Fechingre = document.getElementById('Fechingre').value.trim();
  const Tlicencia = document.getElementById('Tlicencia').value.trim();
  const Nlicencia = document.getElementById('Nlicencia').value.trim();
  const DUI = document.getElementById('DUI').value.trim();
  const FECHVENLIC = document.getElementById('FECHVENLIC').value.trim();
  const Tsangre = document.getElementById('Tsangre').value.trim();
  const EnfeCroc = document.getElementById('EnfeCroc').value.trim();
  const Estado = document.getElementById('Estadomo').value.trim();
  const FamEmerger = document.getElementById('FamEmerger').value.trim();
  const NumEMer = document.getElementById('NumEMer').value.trim();
  const Establecimiento = $('#Establecimientomo').val();

  // Función para normalizar fechas
  const crearFechaComparable = (fechaStr) => {
    const fecha = new Date(fechaStr);
    fecha.setHours(0, 0, 0, 0);
    return fecha;
  };

  // Validación de campos vacíos
  if (!Nombre || !Fechnat || !Fechingre || !Tlicencia || !Nlicencia || !DUI ||
    !FECHVENLIC || !Tsangre || !EnfeCroc || !Estado || !FamEmerger || !NumEMer || !Establecimiento) {
    Swal.fire({ icon: "warning", title: "Campos incompletos", text: "Complete todos los campos requeridos." });
    return;
  }

  // Validación de fechas
  const hoy = crearFechaComparable(new Date());

  const fechaNac = crearFechaComparable(Fechnat);
  const edadMinima = new Date(fechaNac);
  edadMinima.setFullYear(edadMinima.getFullYear() + 18);

  if (edadMinima > hoy) {
    Swal.fire({ icon: "error", title: "Error en fecha", text: "El motorista debe tener al menos 18 años." });
    return;
  }

  const fechaIng = crearFechaComparable(Fechingre);
  if (fechaIng < fechaNac) {
    Swal.fire({ icon: "error", title: "Error en fechas", text: "La fecha de ingreso no puede ser anterior a la de nacimiento." });
    return;
  }

  const fechaVenLic = crearFechaComparable(FECHVENLIC);
  if (fechaVenLic < hoy) {
    Swal.fire({ icon: "error", title: "Licencia vencida", text: "La licencia está vencida. Debe ser futura." });
    return;
  }

  // Validación adicional: Fecha ingreso vs vencimiento licencia
  if (fechaIng > fechaVenLic) {
    Swal.fire({ icon: "error", title: "Error en fechas", text: "La fecha de ingreso no puede ser posterior al vencimiento de la licencia." });
    return;
  }

  // Solo si pasa todas las validaciones, activar spinner
  const btnGuardar = document.querySelector('#modalMotorista .btn-primary');
  btnGuardar.disabled = true;
  btnGuardar.innerHTML = '<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span> Guardando...';

  // Crear objeto con los datos
  const nuevoMotorista = {
    Nombre, Fechnat, Fechingre, Tlicencia, Nlicencia,
    DUI, FECHVENLIC, Tsangre, EnfeCroc, Estado,
    FamEmerger, NumEMer, Establecimiento
  };

  console.time('guardarMotorista_total');
  // Enviar a Google Sheets
  google.script.run
    .withSuccessHandler(() => {
      console.timeEnd('guardarMotorista_total');
      // Actualizar DataTable sin recargar
      const tabla = $('#tablaMotoristas').DataTable();
      tabla.row.add([
        Nombre, Fechnat, Fechingre, Tlicencia, Nlicencia,
        DUI, FECHVENLIC, Tsangre, EnfeCroc, Estado,
        FamEmerger, NumEMer, Establecimiento
      ]).draw(false);

      // Cerrar y limpiar formulario
      bootstrap.Modal.getInstance(document.getElementById('modalMotorista')).hide();
      document.getElementById('modalMotorista').querySelectorAll('input, select').forEach(el => el.value = '');

      // Notificación y reset
      Swal.fire({ icon: "success", title: "¡Guardado!", text: "Motorista registrado correctamente.", timer: 2000 });

function actualizarMotorista() {
  // Obtener datos del formulario
  const index = parseInt(document.getElementById('MotoristaRowIndexEdit').value);
  const Nombre = document.getElementById('NombremoEdit').value.trim();
  const Fechnat = document.getElementById('FechnatEdit').value.trim();
  const Fechingre = document.getElementById('FechingreEdit').value.trim();
  const Tlicencia = document.getElementById('TlicenciaEdit').value.trim();
  const Nlicencia = document.getElementById('NlicenciaEdit').value.trim();
  const DUI = document.getElementById('DUIEdit').value.trim();
  const FECHVENLIC = document.getElementById('FECHVENLICEdit').value.trim();
  const Tsangre = document.getElementById('TsangreEdit').value.trim();
  const EnfeCroc = document.getElementById('EnfeCrocEdit').value.trim();
  const Estado = document.getElementById('EstadoEditmo').value.trim();
  const FamEmerger = document.getElementById('FamEmergerEdit').value.trim();
  const NumEMer = document.getElementById('NumEMerEdit').value.trim();
  const Establecimiento = $('#EstablecimientomoEditSelect').val();

  // Función para normalizar fechas
  const crearFechaComparable = (fechaStr) => {
    const fecha = new Date(fechaStr);
    fecha.setHours(0, 0, 0, 0);
    return fecha;
  };

  // Validación de campos vacíos
  if (!Nombre || !Fechnat || !Fechingre || !Tlicencia || !Nlicencia || !DUI ||
    !FECHVENLIC || !Tsangre || !EnfeCroc || !Estado || !FamEmerger || !NumEMer || !Establecimiento) {
    Swal.fire({ icon: "warning", title: "Campos incompletos", text: "Complete todos los campos requeridos." });
    return;
  }

  // Validaciones de fecha
  const hoy = crearFechaComparable(new Date());

  const fechaNac = crearFechaComparable(Fechnat);
  const edadMinima = new Date(fechaNac);
  edadMinima.setFullYear(edadMinima.getFullYear() + 18);

  if (edadMinima > hoy) {
    Swal.fire({ icon: "error", title: "Error en fecha", text: "El motorista debe tener al menos 18 años." });
    return;
  }

  const fechaIng = crearFechaComparable(Fechingre);
  if (fechaIng < fechaNac) {
    Swal.fire({ icon: "error", title: "Error en fechas", text: "La fecha de ingreso no puede ser anterior a la de nacimiento." });
    return;
  }

  const fechaVenLic = crearFechaComparable(FECHVENLIC);
  if (fechaVenLic < hoy) {
    Swal.fire({ icon: "error", title: "Licencia vencida", text: "La licencia está vencida. Debe ser futura." });
    return;
  }

  // Validación adicional: Fecha ingreso vs vencimiento licencia
  if (fechaIng > fechaVenLic) {
    Swal.fire({ icon: "error", title: "Error en fechas", text: "La fecha de ingreso no puede ser posterior al vencimiento de la licencia." });
    return;
  }

  // Solo si pasa todas las validaciones, activar spinner
  const btnActualizar = document.querySelector('#modalEditarMotorista .btn-primary');
  btnActualizar.disabled = true;
  btnActualizar.innerHTML = '<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span> Actualizando...';

  // Crear objeto actualizado
  const motoristaActualizado = {
    Nombre, Fechnat, Fechingre, Tlicencia, Nlicencia,
    DUI, FECHVENLIC, Tsangre, EnfeCroc, Estado,
    FamEmerger, NumEMer, Establecimiento
  };

  // Enviar actualización
  google.script.run
    .withSuccessHandler(() => {
      // Actualizar fila en DataTable
      const tabla = $('#tablaMotoristas').DataTable();
      const estadoBadge = Estado == 1
        ? '<span class="badge bg-success">Activo</span>'
        : '<span class="badge bg-danger">Inactivo</span>';
      tabla.row(index).data([
        Nombre, Fechnat, Fechingre, Tlicencia, Nlicencia,
        DUI, FECHVENLIC, Tsangre, EnfeCroc, estadoBadge,
        FamEmerger, NumEMer, Establecimiento
      ]).draw(false);

      // Cerrar modal
      bootstrap.Modal.getInstance(document.getElementById('modalEditarMotorista')).hide();

      // Notificación
      Swal.fire({ icon: "success", title: "¡Actualizado!", text: "Datos modificados correctamente.", timer: 2000 });
      resetButton(btnActualizar);
    })
    .withFailureHandler(error => {
      Swal.fire({ icon: "error", title: "Error", text: error.message });
      resetButton(btnActualizar);
    })
    .actualizarMotoristaEnHoja(motoristaActualizado, index + 2);
}

  const ult_fechmantenimiento = document.getElementById('ult_fechmantenimiento').value.trim();
  const costmante = document.getElementById('costmante').value.trim();

  // Validación de campos vacíos
  if (!Placa || !tipovehiculo || !tipogasolina || !Estado || !aniovehiculo || !Establecimiento || !marca || !Modelo || !ult_fechmantenimiento || !costmante) {

function escapeHTML(text) {
  if (!text) return '';
  return text.toString()
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");
}

function validarHorario(horaStr) {
  // Convierte "HH:MM" a número de horas (24h)
  const [horas, minutos] = horaStr.split(":").map(Number);
  const totalHoras = horas + (minutos / 60);

  // Rango permitido: 7:00 (7) a 17:00 (17)
  return totalHoras >= 7 && totalHoras <= 17;
}

  const textoOriginal = btnActualizar.innerHTML;
  btnActualizar.disabled = true;
  btnActualizar.innerHTML = '<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span> Actualizando...';

  // Llamar a la función que recarga la tabla
  listarSolicitudesN();

  // Restaurar el botón después de un breve delay para simular la carga
  setTimeout(() => {
    btnActualizar.disabled = false;
    btnActualizar.innerHTML = textoOriginal;
  }, 1000);
}

// Event listener para el botón de actualizar tabla
document.getElementById('actualizarTabla2').addEventListener('click', actualizarTablaSolicitudesNuevas);

</script>
